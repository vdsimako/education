services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: infra-basics-app
      APP_ENV: local
      LOG_LEVEL: INFO
      PORT: 8000
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
