name: Test Day Workflow

on:
  workflow_call:
    inputs:
      day_name:
        required: true
        type: string
        description: "Name of the day directory (e.g., day_1, day_2)"

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r learnPython/requirements.txt

      - name: Run tests for ${{ inputs.day_name }}
        run: |
          cd learnPython/${{ inputs.day_name }}
          if [ -d "test" ]; then
            python -m pytest test/ -v
          else
            echo "No test directory found, skipping tests"
          fi
