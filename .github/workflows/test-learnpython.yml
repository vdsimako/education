name: Run Tests for LearnPython Days

on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened, ready_for_review ]
    paths:
      - 'learnPython/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      days: ${{ steps.changes.outputs.days }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed days
        id: changes
        run: |
          days=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | \
                grep -E '^learnPython/day_[0-9]+' | \
                sed 's|learnPython/\([^/]*\)/.*|\1|' | \
                sort -u | \
                tr '\n' ',' | \
                sed 's/,$//')
          echo "days=$days" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && needs.detect-changes.outputs.days != ''
    needs: detect-changes
    strategy:
      matrix:
        day: ${{ fromJson(needs.detect-changes.outputs.days) }}
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r learnPython/requirements.txt

      - name: Run tests for ${{ matrix.day }}
        run: |
          cd learnPython/${{ matrix.day }}
          if [ -d "test" ]; then
            python -m pytest test/ -v
          else
            echo "No test directory found, skipping tests"
          fi
