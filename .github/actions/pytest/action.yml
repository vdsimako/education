name: 'Run Pytest'
description: 'Runs pytest tests for a specific day'

inputs:
  day_name:
    description: 'Name of the day directory'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run tests for ${{ inputs.day_name }}
      shell: bash
      run: |
        cd learnPython/${{ inputs.day_name }}
        
        # Activate virtual environment if it exists
        if [ -d ".venv" ]; then
          echo "Activating virtual environment"
          source .venv/bin/activate
        fi
        
        if [ -d "test" ]; then
          python -m pytest test/ -v
        elif [ -d "tests" ]; then
          python -m pytest tests/ -v
        else
          echo "No test or tests directory found, skipping tests"
        fi
