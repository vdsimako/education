name: 'Run Mypy'
description: 'Runs mypy type checking for a specific day'

inputs:
  day_name:
    description: 'Name of the day directory'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run mypy for ${{ inputs.day_name }}
      shell: bash
      run: |
        cd learnPython/${{ inputs.day_name }}
        if [ -d "src" ]; then
          mypy src/ --ignore-missing-imports
        else
          echo "No src directory found, skipping mypy"
        fi
