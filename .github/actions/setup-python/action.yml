name: 'Setup Python Environment'
description: 'Sets up Python environment with caching and dependency installation'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.13'
  requirements-path:
    description: 'Path to requirements.txt file'
    required: false
    default: 'learnPython/requirements.txt'
  day-name:
    description: 'Day directory name (for day-specific requirements)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        
        # Check for day-specific requirements first
        if [ -n "${{ inputs.day-name }}" ] && [ -f "learnPython/${{ inputs.day-name }}/requirements.txt" ]; then
          echo "Installing day-specific requirements for ${{ inputs.day-name }}"
          pip install -r learnPython/${{ inputs.day-name }}/requirements.txt
        elif [ -f "${{ inputs.requirements-path }}" ]; then
          echo "Installing shared requirements"
          pip install -r ${{ inputs.requirements-path }}
        else
          echo "No requirements.txt found, skipping dependency installation"
        fi
